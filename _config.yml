# =====================================================================
# Site config — Hoang Anh (Benjamin) Nguyen
# =====================================================================

# Basic
locale       : "en-US"
title        : "Hoang Anh (Benjamin) Nguyen"
description  : "Computational physics of planetary materials — quantum computing, molecular dynamics, DFT, Earth & planetary science."
url          : "https://x-repos.github.io"
baseurl      : ""
repository   : "x-repos/x-repos.github.io"

# Author (used in templates: {{ site.author.name }}, etc.)
author:
  name     : "Hoang Anh (Benjamin) Nguyen"
  email    : "hoanganh_nguyen@mines.edu"
  location : "Denver, CO, USA"
  employer : "Colorado School of Mines"
  github   : "x-repos"
  orcid    : "http://orcid.org/0000-0002-7504-5284"

# Build
markdown    : kramdown
highlighter : rouge
timezone    : America/Denver
permalink   : /:title/

# Where to look
include:
  - _pages

# Where NOT to look (build artifacts, local installs, etc.)
exclude:
  - vendor
  - .bundle
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules

# Per-collection defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: pages
    values:
      layout: page

# Plugins (must match what github-pages allows)
plugins:
  - jekyll-feed
  - jekyll-sitemap
